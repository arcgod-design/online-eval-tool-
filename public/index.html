<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Evaluation Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <!-- Animated background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- Name prompt overlay (shown on first visit) -->
  <div class="modal-overlay" id="nameOverlay" style="display:none;">
    <div class="modal-box" style="max-width:380px;padding:36px 40px;text-align:center;">
      <h2 style="color:#0f172a;margin-bottom:10px;font-size:22px;">👋 Welcome!</h2>
      <p style="color:#64748b;font-size:14px;margin-bottom:22px;">What should we call you?</p>
      <input type="text" id="nameInput" placeholder="Enter your name…"
             style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid #e2e8f0;
                    font-size:15px;outline:none;margin-bottom:16px;color:#1e293b;">
      <button onclick="saveName()"
              style="width:100%;padding:12px;border:none;border-radius:10px;
                     background:linear-gradient(135deg,#0d9488,#14b8a6);
                     color:#fff;font-size:15px;font-weight:700;cursor:pointer;">
        Continue
      </button>
    </div>
  </div>

  <div class="login-card fade-in">
    <h1 class="site-title">Online Evaluation Tool</h1>
    <p class="subtitle" id="greetMsg">Welcome! Please log in to continue.</p>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="your@college.edu" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="••••••••" required>
      </div>
      <div id="loginError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Login</button>
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
