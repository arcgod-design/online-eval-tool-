<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard – Online Evaluation Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <header>
    <div>
      <h1 class="site-title-sm">Online Evaluation Tool</h1>
      <span id="headerSub">Teacher Dashboard</span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </header>

  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb">Home</div>

  <!-- ── STEP 1: Subjects ─────────────────────────────── -->
  <section id="secSubjects">
    <h2>Your Subjects</h2>
    <div class="card-grid" id="subjectGrid"></div>
  </section>

  <!-- ── STEP 2: Assignments ──────────────────────────── -->
  <section id="secAssignments" class="hidden">
    <div class="section-header">
      <h2 id="assignHeading">Assignments</h2>
      <button class="btn-export" onclick="toggleNewForm()">+ New Assignment</button>
    </div>

    <!-- Search + multi-select action bar -->
    <div class="filter-bar" style="margin-bottom:16px;">
      <input type="text" id="assignSearch" placeholder="Search assignments..." oninput="filterAssignmentCards()" style="min-width:260px;">
      <button id="viewSelectedBtn" class="btn-save hidden" onclick="viewSelectedSubmissions()">View Submissions</button>
    </div>

    <!-- New assignment form -->
    <div class="submit-card fade-in hidden" id="newAssignForm" style="max-width:560px;margin-bottom:24px;">
      <div class="input-group">
        <label>Assignment Name</label>
        <input type="text" id="newAssignName" placeholder="e.g. Mini Project" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div class="input-group" style="flex:1;min-width:180px;">
          <label>Open Date</label>
          <input type="datetime-local" id="newAssignOpen" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
        </div>
        <div class="input-group" style="flex:1;min-width:180px;">
          <label>Close / Deadline</label>
          <input type="datetime-local" id="newAssignDeadline" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
        </div>
      </div>
      <div id="newAssignError" class="error-msg" style="color:#ef4444;"></div>
      <button class="btn-save" onclick="createAssignment()">Create Assignment</button>
    </div>

    <div class="card-grid" id="assignmentGrid"></div>
  </section>

  <!-- ── STEP 3: Submissions (Phase 1) ────────────────── -->
  <section id="secProjects" class="hidden">
    <div class="section-header">
      <h2 id="projectHeading">Student Submissions</h2>
      <button class="btn-export" id="exportBtn">Export Marks (Excel)</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" id="filterRoll" placeholder="Filter by Roll No..." oninput="applyFilter()">
      <input type="text" id="filterName" placeholder="Filter by Student Name..." oninput="applyFilter()">
      <select id="filterAssignment" onchange="applyFilter()" style="padding:8px 14px;border-radius:9px;border:1px solid #e2e8f0;font-size:13px;outline:none;min-width:200px;">
        <option value="">All Assignments</option>
      </select>
      <button class="btn-toggle" onclick="clearFilters()">Clear</button>
    </div>

    <p class="page-info" id="pageInfo"></p>
    <div class="project-grid" id="projectGrid"></div>
    <div class="pagination" id="pagination"></div>
  </section>

  <!-- ── EDIT ASSIGNMENT MODAL ──────────────────────── -->
  <div class="modal-overlay hidden" id="editAssignModal">
    <div class="modal-box" style="max-width:680px;">
      <button class="modal-close" onclick="closeEditModal()">✕</button>
      <div class="modal-header">
        <h3 id="editAssignTitle">Edit Assignment</h3>
      </div>

      <!-- Basic info -->
      <div class="input-group" style="margin-top:10px;">
        <label style="color:#1e293b;">Assignment Name</label>
        <input type="text" id="editAssignName" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div class="input-group" style="flex:1;min-width:180px;">
          <label style="color:#1e293b;">Open Date</label>
          <input type="datetime-local" id="editAssignOpen" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
        </div>
        <div class="input-group" style="flex:1;min-width:180px;">
          <label style="color:#1e293b;">Deadline</label>
          <input type="datetime-local" id="editAssignDeadline" style="background:#fff;color:#1e293b;border:1px solid #e2e8f0;">
        </div>
      </div>
      <button class="btn-save" onclick="saveAssignmentEdit()">Save Changes</button>

      <hr style="margin:20px 0;border-color:#e2e8f0;">

      <!-- Questions -->
      <h4 style="color:#0f172a;margin-bottom:12px;">Questions</h4>
      <div id="questionList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input type="text" id="newQuestionText" placeholder="Add a question..." style="flex:1;padding:9px 14px;border-radius:9px;border:1px solid #e2e8f0;font-size:13px;outline:none;min-width:200px;">
        <button class="btn-save" onclick="addQuestion()">Add</button>
      </div>

      <hr style="margin:20px 0;border-color:#e2e8f0;">

      <!-- Attachments -->
      <h4 style="color:#0f172a;margin-bottom:12px;">Attachments / Reference Files</h4>
      <div id="attachmentList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <input type="file" id="newAttachFile" style="font-size:13px;">
        <button class="btn-save" onclick="uploadAttachment()">Upload</button>
      </div>
      <div id="editAssignError" class="error-msg" style="color:#ef4444;margin-top:8px;"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       MODAL  (Phase 2 + Phase 3)
  ═══════════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="evalModal">
    <div class="modal-box">

      <button class="modal-close" onclick="closeModal()">✕</button>

      <div class="modal-header">
        <div>
          <h3 id="modalTitle"></h3>
          <p id="modalMeta"></p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" id="tabSS"   onclick="showTab('ss')">📷 Screenshots</button>
        <button class="tab-btn"        id="tabCode" onclick="showTab('code')">💻 Code / Files</button>
      </div>

      <!-- Screenshots tab -->
      <div class="tab-pane" id="paneScreenshots">
        <div class="ss-gallery" id="ssGallery"></div>
      </div>

      <!-- Code / Files tab -->
      <div class="tab-pane hidden" id="paneCode">
        <div id="fileList" class="file-list"></div>
        <div id="fileViewer" class="file-viewer hidden"></div>
      </div>

      <!-- Phase 3: Marks -->
      <div class="marks-row">
        <label>Marks:</label>
        <input type="number" id="marksInput" min="0" max="100" placeholder="0–100">
        <button class="btn-save" onclick="saveMarks()">💾 Save Marks</button>
        <span class="save-status" id="saveStatus"></span>
      </div>

    </div>
  </div>

  <!-- ── DELETE ASSIGNMENT MODAL ──────────────────────── -->
  <div class="modal-overlay hidden" id="deleteAssignModal">
    <div class="modal-box" style="max-width:440px;text-align:center;">
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
      <h3 style="color:#0f172a;margin-bottom:10px;">Delete Assignment</h3>
      <p style="color:#64748b;font-size:14px;margin-bottom:20px;">
        Are you sure you want to delete <strong id="deleteAssignName"></strong>?
      </p>
      <input type="hidden" id="deleteAssignId">
      <label style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px;font-size:14px;color:#1e293b;cursor:pointer;">
        <input type="checkbox" id="deleteDataCheck" style="width:16px;height:16px;accent-color:#ef4444;">
        Also delete all student submissions for this assignment
      </label>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button class="btn-toggle" style="padding:9px 22px;" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-toggle" style="background:#ef4444;padding:9px 22px;" onclick="doDeleteAssignment()">Delete</button>
      </div>
    </div>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
